command:
  - "streamlit"
  - "run"
  - "app/streamlit_app.py"

env:
  - name: DATABRICKS_SQL_WAREHOUSE_ID
    valueFrom: sql-warehouse
  - name: ALPHA_VANTAGE_API_KEY
    valueFrom: secret

resources:
  - files:
      - source_path: requirements.txt
  - name: sql-warehouse
    type: sql_warehouse
  - name: secret
    type: secret
    key: alpha-vantage-api-key
